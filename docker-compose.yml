services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tekstil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
      POSTGRES_DB: ${POSTGRES_DB:-tekstil_mes}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tekstil} -d ${POSTGRES_DB:-tekstil_mes}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Opsiyonel: self-hosted Supabase stack için ek servisler (gotrue, storage, kong)
  # ilk aşamada sadece Postgres + Redis yeterli.

volumes:
  pg_data:
  redis_data:
